preset: dark

theme:
  base:
    danger: "#ff6188"
    info: "#78dce8"
    muted: "#727072"
    primary: "#a9dc76"
    secondary: "#ffd866"
    success: "#a9dc76"
    warning: "#fc9867"
    key: "#78dce8"

  data:
    key: "#78dce8"
    string: "#ffd866"
    true: "#a9dc76"
    false: "#ff6188"
    number: "#ab9df2"
    null: "#727072"
    quantity: "#fc9867"
    duration: "#fc9867"
    durationFresh: "#a9dc76"

  status:
    ok: "#a9dc76"
    warning: "#fc9867"
    error: "#ff6188"

  table:
    header: "fg=#f8f8f2:bold"
    columns:
      - "#f8f8f2"
      - "#fcfcfa"

  logs:
    key: "#78dce8"
    quotedString: "#ffd866"
    date: "#727072"
    severity:
      trace: "#727072"
      debug: "#78dce8"
      info: "#a9dc76"
      warning: "#fc9867"
      error: "#ff6188"
      fatal: "fg=#ff6188:bold"

  shell:
    comment: "#727072"
    command: "#a9dc76"
    arg: "#f8f8f2"
    flag: "#fc9867"

  diff:
    unchanged: "#f8f8f2"
    added: "#a9dc76"
    removed: "#ff6188"
