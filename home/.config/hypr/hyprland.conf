# -------------------------------------------------------------------------
# Variables
# -------------------------------------------------------------------------
$menu = fuzzel
$terminal = wezterm
$fileManager = nautilus
$mainMod = super

# -------------------------------------------------------------------------
# Theme
# -------------------------------------------------------------------------
source=~/.config/hypr/theme.conf

# -------------------------------------------------------------------------
# XWayland
# -------------------------------------------------------------------------
xwayland {
    force_zero_scaling = true
}

# -------------------------------------------------------------------------
# Workspaces
# -------------------------------------------------------------------------
workspace= name:1, monitor:HDMI-A-1

# -------------------------------------------------------------------------
# Autostart
# -------------------------------------------------------------------------
exec-once = waybar & hyprpaper & hyprlock & swaync & hyprctl dispatch workspace 1

# -------------------------------------------------------------------------
# Environment
# -------------------------------------------------------------------------
env = PATH,$HOME/.local/bin:$PATH
env = XCURSOR_SIZE,24
env = XDG_SESSION_TYPE,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

# -------------------------------------------------------------------------
# Input
# -------------------------------------------------------------------------
input {
kb_layout = us
kb_variant =
kb_model =
kb_options =
kb_rules =
kb_options = ctrl:nocaps

follow_mouse = 1

touchpad {
    natural_scroll = yes
    clickfinger_behavior = 1
}

sensitivity = 0
}

# -------------------------------------------------------------------------
# General
# -------------------------------------------------------------------------
general {
    border_size = 2
    resize_on_border = true
    gaps_in = 0
    gaps_out = 0
    layout = dwindle
    allow_tearing = false
}

# -------------------------------------------------------------------------
# Decoration
# -------------------------------------------------------------------------
decoration {
    rounding = 4
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# -------------------------------------------------------------------------
# Animations
# -------------------------------------------------------------------------
animations {
    enabled = true
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# -------------------------------------------------------------------------
# Layout
# -------------------------------------------------------------------------
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# -------------------------------------------------------------------------
# Misc
# -------------------------------------------------------------------------
misc {
    focus_on_activate = true
    force_default_wallpaper = 0
}

# -------------------------------------------------------------------------
# Devices
# -------------------------------------------------------------------------
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# -------------------------------------------------------------------------
# Monitors
# -------------------------------------------------------------------------
monitor=,preferred,auto,1.6,bitdepth,10
monitor=eDP-1,preferred,auto,1.6,bitdepth,10

# -------------------------------------------------------------------------
# Window Rules
# -------------------------------------------------------------------------
windowrule = border_size 0, match:workspace w[tv1]
windowrule = border_size 0, match:fullscreen 1
windowrule = focus_on_activate on, match:class .*

# -------------------------------------------------------------------------
# Keybinds - Apps
# -------------------------------------------------------------------------
bind = $mainMod, t, exec, hyprtoggle --class "org.wezfurlong.wezterm" --exec "wezterm" --on-hide "ffplay -nodisp -autoexit $HOME/.files/sounds/windwaker/pause-close.mp3" --on-focus "ffplay -nodisp -autoexit $HOME/.files/sounds/windwaker/pause.mp3"
bind = $mainMod, e, exec, 1; hyprtoggle --maximize --class "org.gnome.Nautilus" --exec "nautilus"
bind = $mainMod, b, exec, hyprtoggle --class "google-chrome" --exec "google-chrome-stable" --on-hide "ffplay -nodisp -autoexit $HOME/.files/sounds/kingdom-hearts/pause-close.mp3" --on-focus "ffplay -nodisp -autoexit $HOME/.files/sounds/kingdom-hearts/pause.mp3" --cycle-on-multiple
bind = $mainMod, a, exec, $menu
bind = $mainMod, v, exec, nvim-scratch

# -------------------------------------------------------------------------
# Keybinds - Windows
# -------------------------------------------------------------------------
bind = $mainMod, backspace, focuscurrentorlast
bind = $mainMod, backspace, fullscreen, 1
bind = $mainMod, f, fullscreen, 1
bind = $mainMod, q, exec, hyprclose
bind = $mainMod, w, exec, hyprselect
bind = $mainMod, Tab, exec, hyprselect
bind = ALT, Tab, exec, hyprselect

# -------------------------------------------------------------------------
# Keybinds - Focus
# -------------------------------------------------------------------------
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u

# -------------------------------------------------------------------------
# Keybinds - Move Windows
# -------------------------------------------------------------------------
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, j, layoutmsg, togglesplit
bind = $mainMod SHIFT, k, layoutmsg, togglesplit

# -------------------------------------------------------------------------
# Keybinds - Workspaces
# -------------------------------------------------------------------------
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -------------------------------------------------------------------------
# Keybinds - Mouse Pointer (wl-kbptr)
# -------------------------------------------------------------------------
bind = $mainMod, m, exec, pgrep -x wl-kbptr > /dev/null && pkill -x wl-kbptr || (wl-kbptr -o modes=floating,click; wlrctl pointer move 1 0; wlrctl pointer move -1 0)
bind = $mainMod SHIFT, m, exec, pkill -x wl-kbptr; wl-kbptr -o modes=tile,click; wlrctl pointer move 1 0; wlrctl pointer move -1 0
bind = $mainMod, space, exec, wlrctl pointer click left
bind = $mainMod SHIFT, space, exec, wlrctl pointer click right
binde=$mainMod+alt, j, exec, wlrctl pointer move 0 10
binde=$mainMod+alt, k, exec, wlrctl pointer move 0 -10
binde=$mainMod+alt, l, exec, wlrctl pointer move 10 0
binde=$mainMod+alt, h, exec, wlrctl pointer move -10 0

# -------------------------------------------------------------------------
# Keybinds - Misc
# -------------------------------------------------------------------------
bind = $mainMod, s, exec, hyprshot -m region --clipboard-only
